<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f3f2f1" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#141414" media="(prefers-color-scheme: dark)" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/assets/word-editor-boot-v1.css" />
  <title>word-editor sealed WASM demo</title>
</head>
<body>
  <word-editor id="editor" mode="edit" engine="ts" license-required license-feature="docx">
    <div class="we-boot" role="status" aria-live="polite">
      <div class="we-boot-titlebar">
        <span class="we-boot-title-left">
          <span class="we-boot-launcher" aria-hidden="true"></span>
          <span class="we-boot-mark" aria-hidden="true">W</span>
          <span class="we-boot-document-name">sealed-runtime.docx</span>
          <span class="we-boot-saved" aria-hidden="true">✓</span>
        </span>
        <span class="we-boot-search" aria-hidden="true">Search tools, help, and commands</span>
        <span class="we-boot-title-end" aria-hidden="true"></span>
      </div>
      <div class="we-boot-tabs" aria-hidden="true">
        <span class="we-boot-tab-list"><span>File</span><span data-active>Home</span><span>Insert</span><span>Layout</span><span>References</span><span>Review</span><span>View</span><span>Help</span></span>
        <span class="we-boot-tab-actions"><span>Comments</span><span>Editing</span><span>Share</span></span>
      </div>
      <div class="we-boot-ribbon-shell" aria-hidden="true">
        <div class="we-boot-ribbon">
          <span class="we-boot-group we-boot-group-undo" data-label="Undo"></span>
          <span class="we-boot-group we-boot-group-clipboard" data-label="Clipboard"></span>
          <span class="we-boot-group we-boot-group-font" data-label="Font"></span>
          <span class="we-boot-group we-boot-group-paragraph" data-label="Paragraph"></span>
          <span class="we-boot-group we-boot-group-styles" data-label="Styles"></span>
          <span class="we-boot-group we-boot-group-editing" data-label="Editing"></span>
        </div>
      </div>
      <div class="we-boot-stage">
        <div class="we-boot-card">
          <span class="we-boot-mark" aria-hidden="true">W</span>
          <span class="we-boot-copy"><span class="we-boot-eyebrow">WORD EDITOR</span><strong>Preparing sealed runtime</strong><small>The editor core is loading from this sealed WASM package.</small></span>
          <span class="we-boot-progress" aria-hidden="true"><span></span></span>
        </div>
      </div>
      <div class="we-boot-status" aria-hidden="true"></div>
    </div>
  </word-editor>
  <div id="toast" class="we-boot-toast" hidden></div>
  <script type="module" src="/local-wasm-loader.mjs"></script>
</body>
</html>
